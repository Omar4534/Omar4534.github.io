<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fullscreen Button Injector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e11; --surface: #18181d; --border: #2a2a35;
      --accent: #7c6aff; --accent2: #ff6a9b; --text: #f0eeff;
      --muted: #7b7a9a; --success: #4ade9e;
      --mono: 'JetBrains Mono', monospace; --display: 'Syne', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--display); min-height: 100vh; display: flex; flex-direction: column; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    header { position: relative; z-index: 1; padding: 3rem 2rem 2rem; max-width: 760px; margin: 0 auto; width: 100%; }
    .badge { display: inline-block; font-family: var(--mono); font-size: 11px; color: var(--accent); border: 1px solid var(--accent); padding: 3px 10px; border-radius: 20px; margin-bottom: 1rem; letter-spacing: 0.08em; text-transform: uppercase; }
    h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; }
    h1 span { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .subtitle { margin-top: 0.75rem; color: var(--muted); font-size: 1rem; font-weight: 500; line-height: 1.6; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 1.5rem; }
    .nav-btn { font-family: var(--mono); font-size: 12px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); text-decoration: none; transition: all 0.15s; }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,106,255,0.08); }
    main { position: relative; z-index: 1; flex: 1; max-width: 760px; margin: 0 auto; width: 100%; padding: 0 2rem 4rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem; margin-bottom: 1.25rem; }
    .card-label { font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px; }
    .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; font-family: var(--mono); font-size: 12px; color: var(--text); resize: vertical; line-height: 1.6; transition: border-color 0.2s; min-height: 200px; }
    textarea:focus { outline: none; border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    textarea[readonly] { cursor: default; opacity: 0.9; }
    input[type=text] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-family: var(--mono); font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s; }
    input[type=text]:focus { border-color: var(--accent); }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1.25rem; }
    .btn { font-family: var(--display); font-weight: 700; font-size: 14px; padding: 10px 22px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; transition: all 0.15s; }
    .btn:hover { border-color: var(--muted); background: rgba(255,255,255,0.04); }
    .btn:active { transform: scale(0.97); }
    .btn.primary { background: linear-gradient(135deg, var(--accent), #5b4bff); border-color: transparent; color: #fff; }
    .btn.primary:hover { opacity: 0.9; }
    .notice { font-family: var(--mono); font-size: 12px; padding: 10px 14px; border-radius: 8px; margin-top: 12px; display: none; }
    .notice.success { background: rgba(74,222,158,0.1); border: 1px solid rgba(74,222,158,0.3); color: var(--success); }
    .notice.error { background: rgba(255,106,155,0.1); border: 1px solid rgba(255,106,155,0.3); color: var(--accent2); }
    #output-section { display: none; }
    footer { position: relative; z-index: 1; text-align: center; padding: 1.5rem; font-family: var(--mono); font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); }
    @media (max-width: 600px) { header, main { padding-left: 1.25rem; padding-right: 1.25rem; } }
  </style>
</head>
<body>
  <header>
    <div class="badge">&#x26F6; tool</div>
    <h1>Fullscreen<br><span>Button Injector</span></h1>
    <p class="subtitle">Paste your HTML game code and get a launcher that works inside Google Sites embeds.</p>
    <div class="nav-links">
      <a href="https://yoursite.com/page1" target="_blank" class="nav-btn">🎮 Page 1</a>
      <a href="https://yoursite.com/page2" target="_blank" class="nav-btn">🎮 Page 2</a>
      <a href="https://yoursite.com/page3" target="_blank" class="nav-btn">🎮 Page 3</a>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="card-label">01 — paste your html game code</div>
      <textarea id="input" rows="10" placeholder="Paste your full HTML game code here..."></textarea>
    </div>

    <div class="card">
      <div class="card-label">02 — button label</div>
      <input id="btnLabel" type="text" value="Play Fullscreen">
      <div class="btn-row">
        <button class="btn primary" onclick="inject()">&#x26A1; Generate launcher</button>
        <button class="btn" onclick="clearAll()">Clear</button>
      </div>
      <div id="notice" class="notice"></div>
    </div>

    <div id="output-section">
      <div class="card">
        <div class="card-label">03 — your launcher html</div>
        <textarea id="output" rows="16" readonly></textarea>
        <div class="btn-row">
          <button class="btn primary" onclick="copyOutput()">&#x2398; Copy to clipboard</button>
          <button class="btn" onclick="previewLauncher()">&#x25B6; Preview</button>
        </div>
        <div id="copy-notice" class="notice success" style="display:none;">Copied!</div>
      </div>
    </div>
  </main>

  <footer>fullscreen button injector &mdash; works in google sites</footer>

  <script>
    function showNotice(msg, type) {
      var n = document.getElementById('notice');
      n.textContent = msg;
      n.className = 'notice ' + type;
      n.style.display = 'block';
    }

    function inject() {
      var input = document.getElementById('input').value.trim();
      var label = document.getElementById('btnLabel').value.trim() || 'Play Fullscreen';
      if (!input) { showNotice('Please paste your HTML game code first.', 'error'); return; }

      // Split game HTML into lines and build html += '...' statements
      // Escape each line so it's safe inside a single-quoted JS string
      var lines = input.split('\n');
      var htmlLines = '';
      for (var i = 0; i < lines.length; i++) {
        // Escape backslashes first, then single quotes
        var escaped = lines[i]
          .replace(/\\/g, '\\\\')
          .replace(/'/g, "\\'");
        htmlLines += "  html += '" + escaped + "\\n';\n";
      }

      var launcher =
        '<!DOCTYPE html>\n' +
        '<html lang="en">\n' +
        '<head>\n' +
        '<meta charset="utf-8">\n' +
        '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n' +
        '<style>\n' +
        '* { box-sizing: border-box; margin: 0; padding: 0; }\n' +
        'body {\n' +
        '  display: flex;\n' +
        '  align-items: center;\n' +
        '  justify-content: center;\n' +
        '  min-height: 100vh;\n' +
        '  background: #111;\n' +
        '  font-family: "Segoe UI", sans-serif;\n' +
        '}\n' +
        '#launch-btn {\n' +
        '  position: relative;\n' +
        '  display: flex;\n' +
        '  align-items: center;\n' +
        '  justify-content: center;\n' +
        '  gap: 12px;\n' +
        '  padding: 18px 44px;\n' +
        '  font-size: 20px;\n' +
        '  font-weight: 700;\n' +
        '  color: #fff;\n' +
        '  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);\n' +
        '  border: 2px solid rgba(99,179,237,0.4);\n' +
        '  border-radius: 12px;\n' +
        '  cursor: pointer;\n' +
        '  letter-spacing: 1px;\n' +
        '  text-transform: uppercase;\n' +
        '  box-shadow: 0 0 30px rgba(99,179,237,0.15), 0 4px 20px rgba(0,0,0,0.6);\n' +
        '  transition: all 0.25s ease;\n' +
        '  overflow: hidden;\n' +
        '  white-space: nowrap;\n' +
        '}\n' +
        '#launch-btn::before {\n' +
        '  content: "";\n' +
        '  position: absolute; inset: 0;\n' +
        '  background: linear-gradient(135deg, rgba(99,179,237,0.08), transparent);\n' +
        '  opacity: 0; transition: opacity 0.25s;\n' +
        '}\n' +
        '#launch-btn:hover { border-color: rgba(99,179,237,0.8); box-shadow: 0 0 50px rgba(99,179,237,0.35), 0 4px 30px rgba(0,0,0,0.7); transform: translateY(-2px); }\n' +
        '#launch-btn:hover::before { opacity: 1; }\n' +
        '#launch-btn:active { transform: translateY(0); }\n' +
        '.pulse-ring { position: absolute; width: 100%; height: 100%; border-radius: 12px; border: 2px solid rgba(99,179,237,0.4); animation: pulse 2s ease-out infinite; }\n' +
        '@keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.08); opacity: 0; } }\n' +
        '</style>\n' +
        '</head>\n' +
        '<body>\n' +
        '<button id="launch-btn" onclick="launchGame()">\n' +
        '  <div class="pulse-ring"></div>\n' +
        '  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>\n' +
        '  ' + label + '\n' +
        '</button>\n' +
        '<script>\n' +
        'function launchGame() {\n' +
        '  var win = window.open("", "_blank");\n' +
        '  if (!win) { alert("Pop-up blocked! Please allow pop-ups for this site."); return; }\n' +
        '  var html = "";\n' +
        htmlLines +
        '  win.document.open();\n' +
        '  win.document.write(html);\n' +
        '  win.document.close();\n' +
        '}\n' +
        '<\/script>\n' +
        '</body>\n' +
        '</html>';

      document.getElementById('output').value = launcher;
      document.getElementById('output-section').style.display = 'block';
      document.getElementById('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
      showNotice('Done! Upload this file to GitHub Pages and embed that URL in Google Sites.', 'success');
    }

    function previewLauncher() {
      var html = document.getElementById('output').value;
      if (!html) return;
      var win = window.open('', '_blank');
      win.document.open();
      win.document.write(html);
      win.document.close();
    }

    function copyOutput() {
      var out = document.getElementById('output');
      out.select();
      document.execCommand('copy');
      var n = document.getElementById('copy-notice');
      n.style.display = 'block';
      setTimeout(function() { n.style.display = 'none'; }, 2500);
    }

    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
      document.getElementById('output-section').style.display = 'none';
      document.getElementById('notice').style.display = 'none';
    }
  </script>
</body>
</html>
